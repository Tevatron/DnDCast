<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DnDCast — Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<!-- data-role is set to "player" or "dm" by js/app.js from the ?role= URL param.
     One page powers both modes; DM-only elements below stay inert in player role. -->
<body>

  <!-- ── DM badge (DM role only) — guards against casting the wrong tab ── -->
  <div id="dm-badge" hidden>DM &middot; do not cast this tab</div>

  <!-- ── Stage badge (DM role only) — shown when cast updates are suspended ── -->
  <div id="dm-stage-badge" hidden>&#x23F8; Staged &mdash; cast is frozen</div>

  <!-- ── Start Session overlay ─────────────────────────────────── -->
  <div id="start-overlay">
    <div id="start-box">
      <h1>DnD<span>Cast</span></h1>
      <p id="start-subtitle">DM Scene Player</p>
      <button id="start-btn">&#x25B6;&nbsp;&nbsp;Start Session</button>
    </div>
  </div>

  <!-- ── Waiting-for-DM overlay (player role, follower) ────────── -->
  <div id="waiting-overlay" hidden>
    <div id="waiting-box">
      <p id="waiting-msg">Waiting for the DM&hellip;</p>
      <button id="play-solo-btn" class="text-btn">Play solo instead</button>
    </div>
  </div>

  <!-- ── Campaign picker ───────────────────────────────────────── -->
  <div id="campaign-overlay" hidden>
    <div class="picker-box">
      <h2 class="picker-heading">Select Campaign</h2>
      <ul id="campaign-list"></ul>
    </div>
  </div>

  <!-- ── Session picker ────────────────────────────────────────── -->
  <div id="session-overlay" hidden>
    <div class="picker-box">
      <h2 class="picker-heading">Select Session</h2>
      <ul id="session-picker-list"></ul>
    </div>
  </div>

  <!-- ── Scene background ──────────────────────────────────────── -->
  <div id="scene-display"></div>

  <!-- ── Placeholder: shown when image is absent or fails ──────── -->
  <div id="scene-placeholder" hidden>
    <div id="placeholder-content">
      <div id="placeholder-title"></div>
      <div id="placeholder-error"></div>
    </div>
  </div>

  <!-- ── Blackout ──────────────────────────────────────────────── -->
  <div id="blackout" hidden></div>

  <!-- ── DM notes/script overlay (DM role only) ────────────────── -->
  <!-- Two side-by-side cards: Script on the left (read first), Notes on right. -->
  <div id="dm-notes-overlay" hidden>
    <div class="dm-note-card">
      <div class="dm-note-label">Script</div>
      <div id="dm-script-text" class="dm-note-body"></div>
    </div>
    <div class="dm-note-card">
      <div class="dm-note-label">Notes</div>
      <div id="dm-notes-text" class="dm-note-body"></div>
    </div>
  </div>

  <!-- ── Invisible tap zones for prev / next ───────────────────── -->
  <div id="tap-prev" role="button" aria-label="Previous scene"></div>
  <div id="tap-next" role="button" aria-label="Next scene"></div>

  <!-- ── Scene title overlay ───────────────────────────────────── -->
  <div id="title-overlay" class="hidden"></div>

  <!-- ── Controls panel ────────────────────────────────────────── -->
  <div id="controls">

    <!-- Info row: notes toggle · session label · progress · errors -->
    <div id="info-row">
      <button id="notes-toggle-btn" class="text-btn">Notes &#x25B8;</button>
      <span id="session-label"></span>
      <span id="scene-counter"></span>
      <span id="error-msg"></span>
    </div>
    <div id="notes-content" hidden></div>

    <!-- Main buttons -->
    <div id="btn-row">
      <button id="home-btn"            title="Stop &amp; return home">&#x23F9;</button>
      <button id="prev-btn"            title="Previous scene (&#x2190;)">&#x23EE;</button>
      <button id="play-pause-btn"      title="Pause / Resume">&#x25B6;</button>
      <button id="next-btn"            title="Next scene (&#x2192; or Space)">&#x23ED;</button>
      <button id="scenes-btn"          title="Scene list">&#x2630;</button>
      <label id="vol-label" title="Volume">
        <span>&#x1F50A;</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
      </label>
      <div id="overflow-wrap">
        <button id="overflow-btn"      title="More options">&#x22EF;</button>
        <div id="overflow-panel" hidden>
          <button id="blackout-btn"       title="Blackout (B)">&#x25CF;</button>
          <button id="title-btn"          title="Toggle title (T)">T</button>
          <button id="switch-session-btn" title="Switch session">&#x21BA;</button>
          <button id="present-btn"        title="Presentation mode (P)">&#x25A1;</button>
          <button id="dm-overlay-btn"     title="Toggle notes overlay (N)" hidden>&#x1F4D6;</button>
          <button id="dm-listen-btn"      title="Listen to audio on this device" hidden>&#x1F507;</button>
          <button id="dm-stage-btn"       title="Stage mode — suspend cast updates (Z)" hidden>&#x2298;</button>
        </div>
      </div>
      <button id="fullscreen-btn"      title="Fullscreen (F)">&#x26F6;</button>
    </div>

  </div>

  <!-- ── Presentation mode re-show dot ─────────────────────────── -->
  <div id="present-dot" role="button" aria-label="Show controls" title="Tap to show controls"></div>

  <!-- ── Scene list drawer ─────────────────────────────────────── -->
  <div id="drawer-backdrop" hidden></div>
  <div id="scene-drawer" hidden>
    <div id="drawer-header">
      <span>Scenes</span>
      <button id="close-drawer-btn" title="Close">&#x2715;</button>
    </div>
    <ul id="scene-list"></ul>
    <div id="drawer-footer">
      <a href="index.html" class="editor-link">&#x2302; Home</a>
      <a href="editor.html" class="editor-link">&#x270F; Edit Scenes &amp; Sessions</a>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
